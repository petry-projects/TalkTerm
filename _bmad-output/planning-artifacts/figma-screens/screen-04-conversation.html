<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>TalkTerm — Conversation (Center Stage Only)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0D0D0D; width: 1440px; height: 900px; overflow: hidden; }
  .window { width: 1440px; height: 900px; background: linear-gradient(180deg, #1A1A1A 0%, #0D0D0D 100%); display: flex; flex-direction: column; }
  .titlebar { background: #2A2A2A; padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #E0301E; } .dot-y { background: #FFB600; } .dot-g { background: #2E7D32; }
  .titlebar span { flex: 1; text-align: center; font-size: 12px; color: #A0A0A0; }

  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 48px 48px 24px; }

  .avatar-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .avatar-circle { width: 180px; height: 180px; border-radius: 50%; background: linear-gradient(135deg, #D04A02, #EB8C00, #FFB600); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 40px rgba(235,140,0,0.15); }
  .avatar-circle::after { content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 2px solid rgba(235,140,0,0.25); }
  .avatar-circle span { font-size: 56px; font-weight: 700; color: #000; }
  .avatar-name { font-size: 15px; color: #FFB600; font-weight: 500; }
  .avatar-role { font-size: 12px; color: #A0A0A0; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; background: rgba(235,140,0,0.15); color: #FFB600; margin-top: 4px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #FFB600; }

  .caption-bar { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 14px 28px; border-radius: 10px; max-width: 520px; text-align: center; }
  .caption-bar p { font-size: 15px; color: #F0F0F0; line-height: 1.5; }

  .input-area { display: flex; align-items: center; gap: 12px; padding: 16px 24px; background: rgba(0,0,0,0.4); border-radius: 12px; width: 100%; max-width: 600px; }
  .mic-btn { width: 48px; height: 48px; border-radius: 50%; background: #EB8C00; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .mic-btn svg { width: 22px; height: 22px; fill: #000; }
  .text-input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #F0F0F0; font-family: 'Inter', sans-serif; font-size: 14px; }
  .version-badge { position: fixed; bottom: 12px; right: 16px; font-size: 10px; color: #6B6B6B; font-weight: 500; letter-spacing: 0.3px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <span>TalkTerm — Mary, Business Analyst</span>
  </div>
  <div class="stage">
    <div class="avatar-area">
      <div class="avatar-circle"><span>M</span></div>
      <div class="avatar-name">Mary</div>
      <div class="avatar-role">Business Analyst</div>
      <div class="status-pill"><div class="status-dot"></div> Listening</div>
    </div>
    <div class="caption-bar">
      <p>"Hi Sarah! I'm Mary, your Business Analyst. What are you working on today?"</p>
    </div>
    <div class="input-area">
      <button class="mic-btn"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
      <input type="text" class="text-input" placeholder="Type or speak to Mary...">
    </div>
  </div>
  <div class="version-badge">v1.4 — 2026-03-24 12:00 UTC</div>
</div>
</body>
</html>
