# Continuous Integration
#
# Runs quality gates on every push to main and every pull request targeting main.
# All gates must pass before merging (except mutation and E2E — see below).
#
# Tech stack pattern: TypeScript + Electron (npm)
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#1-ci-pipeline-ciyml
#
# Gates (per AGENTS.md §7):
#   typecheck   → tsc --noEmit             (zero errors)
#   lint        → eslint --max-warnings 0  (zero warnings)
#   format      → prettier --check         (all files formatted)
#   test        → vitest run --coverage    (all tests pass, ≥90% coverage)
#   mutation    → stryker run              (≥80% score)  [continue-on-error]
#   e2e         → playwright test          (macOS + Windows)  [continue-on-error]
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static analysis + unit tests (matrix: ubuntu / macOS / Windows) ─────────
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

      - name: Test with coverage
        run: npm test -- --coverage

  # ── Mutation testing (informational; does not block merges) ──────────────────
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npm run test:mutate

  # ── End-to-end tests (informational; does not block merges) ──────────────────
  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
