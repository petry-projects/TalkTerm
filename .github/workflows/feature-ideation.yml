# Feature Ideation — TalkTerm caller stub.
#
# Calls the org-wide reusable workflow at
# petry-projects/.github/.github/workflows/feature-ideation-reusable.yml
# All ideation logic, the multi-skill pipeline, the Opus 4.6 model
# selection, and the github_token override live in the reusable workflow.
#
# To tune the prompt or pipeline for ALL BMAD repos, edit the reusable
# workflow in petry-projects/.github — changes propagate here on next run.
#
# To customise THIS repo's project context, edit the project_context value
# below. That is the only TalkTerm-specific thing in this file.
#
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#8-feature-ideation-feature-ideationyml--bmad-method-repos
name: Feature Research & Ideation (BMAD Analyst)

on:
  schedule:
    - cron: '0 7 * * 5'   # Friday 07:00 UTC (3 AM EDT / 2 AM EST)
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Optional focus area (e.g., "accessibility", "voice UX", "performance")'
        required: false
        type: string
      research_depth:
        description: 'Research depth'
        required: false
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - deep

permissions: {}

concurrency:
  group: feature-ideation
  cancel-in-progress: false

jobs:
  ideate:
    # Permissions cascade from the calling job to the reusable workflow.
    permissions:
      contents: read
      issues: read
      pull-requests: read
      discussions: write
      id-token: write
    uses: petry-projects/.github/.github/workflows/feature-ideation-reusable.yml@main
    with:
      project_context: |
        TalkTerm is a desktop AI agent interface (Electron, TypeScript, React)
        with voice-enabled animated avatars (Rive 2D), targeting non-technical
        users (Sarah persona — PMs, analysts) who want agentic AI workflows
        without a terminal. The project bundles the Claude Agent SDK and
        follows Clean Architecture / DDD with port-based extension points
        (`AgentBackend`, `SpeechToText`, `TextToSpeech`, `AvatarRenderer`).

        Direct competitors: Cursor, Windsurf, Continue, Warp (terminal/editor-
        bound AI tools); Claude Desktop, ChatGPT Desktop (chat-bound). Adjacent
        / embodied-AI players to watch: Razer AVA (H2 2026), NVIDIA ACE, D-ID,
        LiveAvatar, Beyond Presence, Hiora, Fazm.

        Emerging trends to research: voice-first AI interfaces, real-time
        avatar lip-sync and emotional expression, MCP server marketplaces,
        Claude Computer Use, on-device hybrid AI (Windows 11 NPUs), agent
        permissioning UX, BYOK cost transparency.
      focus_area: ${{ inputs.focus_area || '' }}
      research_depth: ${{ inputs.research_depth || 'standard' }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
