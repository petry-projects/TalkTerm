# Code Quality — required status checks for all PRs targeting main.
#
# Jobs in this workflow are the required status checks enforced by the
# "code-quality" repository ruleset. Changing job names here requires
# updating the ruleset required checks list.
#
# Standard: https://github.com/petry-projects/.github/blob/main/standards/github-settings.md#code-quality--required-checks-ruleset-all-repositories
name: Code Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check for package.json
        id: has-package
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found — skipping typecheck (implementation not yet started)"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.has-package.outputs.exists == 'true'
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.has-package.outputs.exists == 'true'
        run: npm ci

      - name: Run typecheck
        if: steps.has-package.outputs.exists == 'true'
        run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check for package.json
        id: has-package
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found — skipping lint (implementation not yet started)"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.has-package.outputs.exists == 'true'
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.has-package.outputs.exists == 'true'
        run: npm ci

      - name: Run lint
        if: steps.has-package.outputs.exists == 'true'
        run: npm run lint

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check for package.json
        id: has-package
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found — skipping format check (implementation not yet started)"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.has-package.outputs.exists == 'true'
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.has-package.outputs.exists == 'true'
        run: npm ci

      - name: Run format check
        if: steps.has-package.outputs.exists == 'true'
        run: npm run format -- --check

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check for package.json
        id: has-package
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found — skipping tests (implementation not yet started)"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.has-package.outputs.exists == 'true'
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.has-package.outputs.exists == 'true'
        run: npm ci

      - name: Run tests
        if: steps.has-package.outputs.exists == 'true'
        run: npm test
